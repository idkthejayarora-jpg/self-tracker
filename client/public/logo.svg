<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="28" fill="#0e0c2e"/>
  <!-- Glow bg -->
  <circle cx="60" cy="62" r="38" fill="url(#glow)" opacity="0.18"/>
  <!-- Leaf motifs -->
  <ellipse cx="28" cy="52" rx="9" ry="4.5" fill="#7c3aed" transform="rotate(-40 28 52)" opacity="0.75"/>
  <ellipse cx="22" cy="66" rx="7" ry="3.5" fill="#6d28d9" transform="rotate(-55 22 66)" opacity="0.6"/>
  <ellipse cx="93" cy="44" rx="8" ry="4" fill="#3b82f6" transform="rotate(35 93 44)" opacity="0.7"/>
  <ellipse cx="97" cy="58" rx="6" ry="3" fill="#2563eb" transform="rotate(50 97 58)" opacity="0.55"/>
  <ellipse cx="85" cy="82" rx="7" ry="3.5" fill="#8b5cf6" transform="rotate(20 85 82)" opacity="0.6"/>
  <ellipse cx="35" cy="84" rx="6" ry="3" fill="#6366f1" transform="rotate(-20 35 84)" opacity="0.55"/>
  <!-- Running figure (stylized) -->
  <!-- Head -->
  <circle cx="72" cy="28" r="9" fill="none" stroke="url(#figgrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Torso -->
  <path d="M67 37 C63 46 58 54 55 60" stroke="url(#figgrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Forward arm (reaching ahead) -->
  <path d="M65 43 C56 40 48 38 44 35" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Back arm -->
  <path d="M66 46 C72 50 78 52 82 50" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <!-- Forward leg (stride) -->
  <path d="M55 60 C49 68 42 76 38 84" stroke="url(#figgrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Back leg (push off) -->
  <path d="M55 60 C60 70 66 78 68 88" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <!-- Motion lines -->
  <line x1="40" y1="56" x2="30" y2="56" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="38" y1="62" x2="27" y2="64" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="36" y1="68" x2="28" y2="71" stroke="#6366f1" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <defs>
    <linearGradient id="figgrad" x1="38" y1="28" x2="82" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
